name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Collect metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # 查找当前版本已有多少个 beta release，编号 +1
          BETA_COUNT=$(gh release list --repo ${{ github.repository }} --limit 100 --json tagName \
            | node -e "
                const releases = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                const count = releases.filter(r => r.tagName.startsWith('v${VERSION}-beta.')).length;
                console.log(count);
              ")
          NEXT_BETA=$((BETA_COUNT + 1))
          TAG="v${VERSION}-beta.${NEXT_BETA}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "prerelease=true" >> $GITHUB_OUTPUT

          # 如果版本号本身不含 beta/alpha/rc，则稳定版用干净 tag
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag will be: ${TAG} (pre-release)"
          fi

      - name: Pack
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: true
          body: |
            Pre-release built from commit `${{ github.sha }}`.

            ## Install

            ```bash
            npx https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/opencd-${{ steps.meta.outputs.version }}.tgz
            ```
          files: "*.tgz"
          generate_release_notes: true
