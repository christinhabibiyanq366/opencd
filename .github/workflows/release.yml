name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Collect metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          MAX_BETA=$(gh release list --repo ${{ github.repository }} --limit 100 --json tagName \
            | node -e "
                const v = '${VERSION}';
                const releases = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                const nums = releases
                  .map(r => { const m = r.tagName.match(/^v(.+)-beta\.(\d+)$/); return m && m[1]===v ? parseInt(m[2],10) : null; })
                  .filter(n => n !== null);
                console.log(nums.length ? Math.max(...nums) : 0);
              ")
          NEXT_BETA=$((MAX_BETA + 1))
          TAG="v${VERSION}-beta.${NEXT_BETA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Update README version
        run: |
          TAG=${{ steps.meta.outputs.tag }}
          VERSION=${{ steps.meta.outputs.version }}
          # 替换 release download URL 里的 tag 和文件名
          sed -i "s|releases/download/v[^/]*/opencd-[0-9][^.]*\.[^t]*tgz|releases/download/${TAG}/opencd-${VERSION}.tgz|g" README.md
          # 替换本地文件引用
          sed -i "s|npm install -g \./opencd-[0-9][^ ]*\.tgz|npm install -g ./opencd-${VERSION}.tgz|g" README.md
          sed -i "s|npx \./opencd-[0-9][^ ]*\.tgz|npx ./opencd-${VERSION}.tgz|g" README.md

      - name: Pack
        run: npm pack

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README unchanged, skipping commit"
          else
            git commit -m "chore: update README install URL to ${{ steps.meta.outputs.tag }} [skip ci]"
            git push
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: true
          body: |
            Pre-release built from commit `${{ github.sha }}`.

            ## Install

            ```bash
            npx https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/opencd-${{ steps.meta.outputs.version }}.tgz
            ```
          files: "*.tgz"
          generate_release_notes: true
